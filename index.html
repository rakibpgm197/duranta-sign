<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>দুরন্ত সাইন পাটগ্রাম</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪧</text></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap');

        :root {
            --primary: #6C63FF;
            --primary-dark: #5a52d5;
            --primary-light: rgba(108,99,255,0.15);
            --secondary: #FF6584;
            --success: #00C896;
            --success-light: rgba(0,200,150,0.15);
            --warning: #FFB830;
            --warning-light: rgba(255,184,48,0.15);
            --danger: #FF5C5C;
            --danger-light: rgba(255,92,92,0.15);
            --info: #00BCD4;
            --dark: #1A1A2E;
            --dark2: #16213E;
            --dark3: #0F3460;
            --card: #1E1E35;
            --card2: #252540;
            --text: #E8E8F5;
            --text-muted: #8888AA;
            --text-dim: #5A5A7A;
            --border: rgba(255,255,255,0.07);
            --border2: rgba(255,255,255,0.12);
            --glass: rgba(255,255,255,0.04);
            --glass2: rgba(255,255,255,0.08);
            --sidebar-width: 260px;
            --radius: 14px;
            --radius-sm: 8px;
            --shadow: 0 8px 32px rgba(0,0,0,0.3);
            --transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; }
        body {
            font-family:'Hind Siliguri','Segoe UI',sans-serif;
            background:var(--dark);
            color:var(--text);
            min-height:100vh;
            overflow-x:hidden;
            line-height:1.6;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            position:fixed; left:0; top:0;
            width:var(--sidebar-width); height:100vh;
            background:var(--dark2);
            border-right:1px solid var(--border);
            display:flex; flex-direction:column;
            z-index:200;
            transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
            overflow-y:auto;
        }
        .sidebar::-webkit-scrollbar { width:3px; }
        .sidebar::-webkit-scrollbar-thumb { background:var(--border2); }

        .sidebar-logo {
            display:flex; align-items:center; gap:14px;
            padding:22px 20px;
            border-bottom:1px solid var(--border);
            background:linear-gradient(135deg,rgba(108,99,255,0.1),rgba(255,101,132,0.05));
        }
        .logo-icon {
            width:48px; height:48px;
            background:linear-gradient(135deg,var(--primary),var(--secondary));
            border-radius:14px;
            display:flex; align-items:center; justify-content:center;
            font-size:1.5rem; flex-shrink:0;
            box-shadow:0 4px 15px rgba(108,99,255,0.4);
        }
        .sidebar-logo h2 { font-size:1rem; font-weight:700; }
        .sidebar-logo p { font-size:0.7rem; color:var(--text-muted); margin-top:2px; }

        .sidebar-menu { padding:15px 12px; flex:1; }
        .menu-label {
            font-size:0.65rem; color:var(--text-dim);
            text-transform:uppercase; letter-spacing:2px;
            padding:10px 10px 6px; font-weight:700;
        }
        .menu-item {
            display:flex; align-items:center; gap:12px;
            padding:11px 14px; border-radius:var(--radius-sm);
            cursor:pointer; transition:var(--transition);
            margin-bottom:3px; font-size:0.9rem;
            color:var(--text-muted); user-select:none; position:relative;
        }
        .menu-item:hover { background:var(--glass2); color:var(--text); transform:translateX(3px); }
        .menu-item.active {
            background:linear-gradient(135deg,var(--primary-light),rgba(255,101,132,0.08));
            color:var(--primary); border:1px solid rgba(108,99,255,0.2); font-weight:600;
        }
        .menu-item.active::before {
            content:''; position:absolute; left:0; top:50%; transform:translateY(-50%);
            width:3px; height:60%; background:var(--primary); border-radius:0 3px 3px 0;
        }
        .menu-item .icon { font-size:1rem; width:22px; text-align:center; flex-shrink:0; }
        .sidebar-footer { padding:15px 20px; border-top:1px solid var(--border); font-size:0.75rem; color:var(--text-muted); }

        /* ===== MAIN ===== */
        .main { margin-left:var(--sidebar-width); min-height:100vh; display:flex; flex-direction:column; }

        /* ===== TOPBAR ===== */
        .topbar {
            position:sticky; top:0; z-index:100;
            height:65px;
            background:rgba(22,33,62,0.97);
            backdrop-filter:blur(20px);
            border-bottom:1px solid var(--border);
            padding:0 25px;
            display:flex; align-items:center; justify-content:space-between; gap:20px;
        }
        .topbar-left { display:flex; align-items:center; gap:15px; }
        .topbar-left h1 { font-size:1.2rem; font-weight:700; line-height:1.2; }
        .topbar-left p { font-size:0.75rem; color:var(--text-muted); }
        .topbar-right { display:flex; align-items:center; gap:12px; }

        .btn-hamburger {
            display:none;
            background:var(--glass2); border:1px solid var(--border2);
            color:var(--text); width:38px; height:38px;
            border-radius:var(--radius-sm); font-size:1.1rem; cursor:pointer;
            transition:var(--transition); align-items:center; justify-content:center;
        }
        .btn-hamburger:hover { background:var(--primary-light); }

        .search-box {
            display:flex; align-items:center; gap:10px;
            background:var(--glass2); border:1px solid var(--border2);
            border-radius:var(--radius-sm); padding:8px 14px; transition:var(--transition);
        }
        .search-box:focus-within { border-color:var(--primary); }
        .search-box input {
            background:none; border:none; outline:none;
            color:var(--text); font-family:inherit; font-size:0.88rem; width:200px;
        }
        .search-box input::placeholder { color:var(--text-muted); }

        /* ===== BUTTONS ===== */
        .btn-primary {
            background:linear-gradient(135deg,var(--primary),var(--primary-dark));
            color:white; border:none; border-radius:var(--radius-sm);
            padding:10px 18px; font-family:inherit; font-size:0.88rem;
            font-weight:600; cursor:pointer; transition:var(--transition);
            display:inline-flex; align-items:center; gap:6px; white-space:nowrap;
        }
        .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(108,99,255,0.4); }

        .btn-secondary {
            background:var(--glass2); color:var(--text-muted);
            border:1px solid var(--border2); border-radius:var(--radius-sm);
            padding:10px 18px; font-family:inherit; font-size:0.88rem;
            font-weight:600; cursor:pointer; transition:var(--transition);
        }
        .btn-secondary:hover { color:var(--text); background:var(--glass); }

        .btn-danger-sm {
            background:var(--danger-light); color:var(--danger);
            border:1px solid rgba(255,92,92,0.2); border-radius:var(--radius-sm);
            padding:8px 15px; font-family:inherit; font-size:0.82rem;
            font-weight:600; cursor:pointer; transition:var(--transition);
        }
        .btn-danger-sm:hover { background:var(--danger); color:white; }

        .btn-link {
            background:none; border:none; color:var(--primary);
            font-family:inherit; font-size:0.82rem; cursor:pointer;
            transition:var(--transition); padding:4px 8px; border-radius:6px;
        }
        .btn-link:hover { background:var(--primary-light); }

        /* ===== CONTENT ===== */
        .content { padding:25px; flex:1; }
        .page { display:none; }
        .page.active { display:block; animation:fadeIn 0.3s ease; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

        /* ===== STAT CARDS ===== */
        .stats-grid {
            display:grid; grid-template-columns:repeat(4,1fr);
            gap:18px; margin-bottom:28px;
        }
        .stat-card {
            background:var(--card); border:1px solid var(--border);
            border-radius:var(--radius); padding:22px;
            position:relative; overflow:hidden; transition:var(--transition);
        }
        .stat-card:hover { transform:translateY(-4px); box-shadow:var(--shadow); }
        .stat-card::after {
            content:''; position:absolute; bottom:-20px; right:-20px;
            width:80px; height:80px; border-radius:50%; opacity:0.08;
        }
